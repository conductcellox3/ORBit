  <rect x="550" y="450" width="350" height="230" class="box-fill" />
  <text x="590" y="510" class="heading">中論点</text>

  <rect x="550" y="750" width="350" height="230" class="box-fill" />
  <text x="590" y="810" class="heading">中論点</text>

  <rect x="1000" y="150" width="820" height="230" class="box-fill" />
  <text x="1040" y="210" class="heading">具体論点</text>

  <rect x="1000" y="450" width="820" height="230" class="box-fill" />
  <text x="1040" y="510" class="heading">具体論点</text>

  <rect x="1000" y="750" width="820" height="230" class="box-fill" />
  <text x="1040" y="810" class="heading">具体論点</text>

  <line x1="450" y1="565" x2="500" y2="565" class="line" />

  <line x1="500" y1="265" x2="500" y2="865" class="line" />

  <line x1="500" y1="265" x2="545" y2="265" class="line" />

  <line x1="500" y1="565" x2="545" y2="565" class="line" />

  <line x1="500" y1="865" x2="545" y2="865" class="line" />

