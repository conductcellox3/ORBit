
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap');
  text { font-family: 'Inter', 'Noto Sans JP', sans-serif; fill: #4b5563; }
  .title { font-size: 32px; font-weight: 700; fill: #9ca3af; }
  .heading { font-size: 40px; font-weight: 600; fill: #6b7280; letter-spacing: 0.1em; }
  .label { font-size: 24px; font-weight: 500; fill: #9ca3af; }
  .small { font-size: 16px; fill: #d1d5db; }
  
  .bg { fill: #f9fafb; }
  .box { fill: none; stroke: #e5e7eb; stroke-width: 2; rx: 16; }
  .box-fill { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; rx: 16; }
  .line { stroke: #e5e7eb; stroke-width: 2; }
  .dashed { stroke: #e5e7eb; stroke-width: 2; stroke-dasharray: 12 12; }
  .arrow { fill: none; stroke: #e5e7eb; stroke-width: 4; marker-end: url(#arrowhead); }
</style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e5e7eb" />
    </marker>
  </defs>
  <rect class="bg" width="1920" height="1080" />
  <text x="60" y="80" class="title">学びの統合</text>
  
  <rect x="760" y="365" width="400" height="400" class="box-fill" />
  <text x="800" y="425" class="heading">中心テーマ</text>

  <rect x="100" y="150" width="500" height="300" class="box-fill" />
  <text x="140" y="210" class="heading">知識</text>

  <rect x="1320" y="150" width="500" height="300" class="box-fill" />
  <text x="1360" y="210" class="heading">気づき</text>

  <rect x="100" y="680" width="500" height="300" class="box-fill" />
  <text x="140" y="740" class="heading">つながり</text>

  <rect x="1320" y="680" width="500" height="300" class="box-fill" />
  <text x="1360" y="740" class="heading">応用</text>

  <line x1="610" y1="340" x2="750" y2="440" class="dashed" />

  <line x1="1310" y1="340" x2="1170" y2="440" class="dashed" />

  <line x1="610" y1="790" x2="750" y2="690" class="dashed" />

  <line x1="1310" y1="790" x2="1170" y2="690" class="dashed" />

</svg>
