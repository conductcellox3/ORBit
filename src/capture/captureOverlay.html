<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capture Overlay</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: crosshair;
    }
    
    #overlay-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }

    #dark-mask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      pointer-events: none;
      transition: opacity 0.1s;
    }

    #dark-mask.hidden {
      opacity: 0;
    }

    #selection-box {
      position: absolute;
      border: 2px solid #3b82f6;
      background-color: transparent;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4); /* Mask trick */
      display: none;
      pointer-events: none;
    }
    
    #selection-box.active {
      display: block;
    }

    .help-text {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 14px;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="overlay-container">
    <div id="dark-mask"></div>
    <div id="selection-box"></div>
    <div class="help-text">Drag to capture, Esc to cancel</div>
  </div>
  <script type="module" src="/capture/captureOverlay.js"></script>
</body>
</html>
