<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORBit v2</title>
    <!-- Support dummy favicon to prevent 404 logs -->
    <link rel="icon" href="data:," />
    <!-- Load all styles -->
    <link rel="stylesheet" href="./styles/index.css" />
  </head>

  <body>
    <div id="app">
      <!-- Topbar -->
      <div id="topbar">
        <div class="title">ORBit</div>
      </div>
      
      <!-- Canvas Area -->
      <div id="canvas-container">
        <!-- The transforming layer that holds all DOM Notes/Frames and Edge endpoints -->
        <div id="board-transform">
          <!-- SVG layer for connecting lines, scales/pans internally -->
          <svg id="edge-layer" xmlns="http://www.w3.org/2000/svg"></svg>
          <!-- Dynamically populated by JS (Notes, Frames) -->
        </div>
      </div>
    </div>

    <!-- Application Entry Point -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
