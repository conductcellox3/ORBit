<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORBit v2</title>
    <!-- Support dummy favicon to prevent 404 logs -->
    <link rel="icon" href="data:," />
    <!-- Load all styles -->
    <link rel="stylesheet" href="./styles/index.css" />
  </head>

  <body>
    <div id="shell-container">
      <!-- Topbar -->
      <div id="topbar">
        <div id="top-left-identity"></div>
        <div id="top-center-tabs"></div>
        <div id="top-right-utils"></div>
      </div>
      
      <!-- Main Shell Area -->
      <div id="shell-main">
        <!-- Left Side -->
        <div id="left-rail" class="rail"></div>
        <div id="left-pane" class="pane">
          <div class="pane-content">
            <div class="pane-header">Explorer</div>
            
            <div class="mock-tree">
              <div class="mock-tree-item is-active">
                <span class="mock-icon">📄</span> Main Board
              </div>
              <div class="mock-tree-item">
                <span class="mock-icon">📁</span> Archive
              </div>
              <div class="mock-tree-item">
                <span class="mock-icon">📁</span> Templates
              </div>
            </div>
          </div>
        </div>
        
        <!-- Central Workspace -->
        <div id="center-workspace">
          <!-- Canvas Area -->
          <div id="canvas-container">
            <!-- Sandbox for Print / PNG isolated capture -->
            <div id="print-overlay-sandbox" style="display: none; position: absolute; top: 0; left: 0; pointer-events: none; z-index:-1000;"></div>
            
            <!-- The transforming layer that holds all DOM Notes/Frames and Edge endpoints -->
            <div id="board-transform">
              <div id="background-layer"></div>
              <!-- SVG layer for connecting lines, scales/pans internally -->
              <svg id="edge-layer" xmlns="http://www.w3.org/2000/svg"></svg>
              <!-- Dynamically populated by JS (Notes, Frames) -->
            </div>
          </div>
        </div>

        <!-- Right Side -->
        <div id="right-pane" class="pane">
          <div class="pane-content">
            <div id="right-pane-action-slot" class="pane-header" style="height: 32px; min-height: 32px; display: flex; align-items: center; padding: 0 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-text-muted);">
               <!-- Dynamically filled by propertiesPanel.js -->
            </div>
            <div id="orbit-properties-body">
              <!-- Content will be injected directly by PropertiesPanel -->
            </div>
          </div>
        </div>
        <div id="right-rail" class="rail">
          <button class="orbit-panel-tab rail-button" data-target="board" title="Board">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          </button>
          <button class="orbit-panel-tab rail-button" data-target="search" title="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
          <button class="orbit-panel-tab rail-button" data-target="inspect" title="Inspect">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </button>
          <button class="orbit-panel-tab rail-button" data-target="harvest" title="Harvest">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          </button>
          <button class="orbit-panel-tab rail-button" data-target="markdown" title="Markdown">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          </button>
        </div>
      </div>
      
      <!-- Help Overlay Container -->
      <div id="orbit-help-overlay" style="display: none;"></div>
    </div>

    <!-- Application Entry Point -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
